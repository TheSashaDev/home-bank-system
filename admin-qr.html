<!DOCTYPE html>
<html>
<head>
  <title>Admin QR Code - Home Bank</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    h1 {
      color: #ff6b9d;
      margin-bottom: 10px;
    }
    .qr-container {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin: 20px 0;
    }
    .info {
      background: #2d2d2d;
      padding: 15px 25px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .pin {
      font-size: 32px;
      font-weight: bold;
      color: #ff6b9d;
      letter-spacing: 8px;
    }
    .label {
      color: #a0a0a0;
      font-size: 14px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏦 Home Bank</h1>
    <p style="color: #a0a0a0;">Картка адміністратора</p>
    
    <div class="qr-container">
      <div id="qrcode"></div>
    </div>
    
    <div class="info">
      <div class="label">PIN-код:</div>
      <div class="pin">0000</div>
    </div>
    
    <p style="color: #6b6b6b; font-size: 12px; margin-top: 20px;">
      Відскануйте QR-код камерою та введіть PIN
    </p>
  </div>

  <script>
    window.addEventListener('load', () => {
      const qrData = '{"v":1,"id":"bb0bbf03-ae7e-4baa-9068-782f5c4bead6","sig":"nkzwjt"}';
      
      new QRCode(document.getElementById('qrcode'), {
        text: qrData,
        width: 400,
        height: 400,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.L
      });
    });
  </script>
</body>
</html>
