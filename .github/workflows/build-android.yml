name: Build Android APKs

on:
  push:
    paths:
      - 'android-webview/**'
      - 'android-scanner/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-webview:
    name: Build WebView APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4
      
      - name: Build APK
        working-directory: android-webview
        run: gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: homebank-webview-apk
          path: android-webview/app/build/outputs/apk/debug/app-debug.apk

  build-scanner:
    name: Build Scanner APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4
      
      - name: Build APK
        working-directory: android-scanner
        run: gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: homebank-scanner-apk
          path: android-scanner/app/build/outputs/apk/debug/app-debug.apk
